<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CircleGuard | Admin Map Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --cyan-600: #0891b2;
            --zinc-900: #18181b;
            --black: #000000;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: #f4f4f5;
        }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        #map {
            height: 600px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
        }
        .ap-marker {
            width: 24px;
            height: 24px;
            background: var(--cyan-600);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan-600);
        }
        .panel {
            background: #111111;
            border: 1px solid #27272a;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-semibold text-cyan-500">Spatial Infrastructure Editor</h1>
                <p class="text-zinc-400">Digital Twin Management | Building: **Edificio Central** | Floor: **3**</p>
            </div>
            <div class="flex gap-4">
                <button class="px-6 py-2 bg-zinc-800 rounded-lg hover:bg-zinc-700 transition">Upload Floor Plan</button>
                <button class="px-6 py-2 bg-cyan-600 rounded-lg font-semibold hover:bg-cyan-500 transition">Save Mapping</button>
            </div>
        </header>

        <div class="grid grid-cols-4 gap-8">
            <aside class="col-span-1 border-r border-zinc-800 pr-8">
                <div class="mb-6">
                    <h3 class="text-sm font-semibold uppercase tracking-wider text-zinc-500 mb-4">Inventory</h3>
                    <div class="space-y-3">
                        <div draggable="true" class="p-4 panel rounded-lg cursor-move border-l-4 border-cyan-600 hover:border-cyan-400 transition">
                            <p class="font-medium text-white">Access Point #001</p>
                            <p class="text-xs text-zinc-500">MAC: 00:1A:2B:3C:4D:5E</p>
                        </div>
                        <div draggable="true" class="p-4 panel rounded-lg cursor-move border-l-4 border-zinc-700 opacity-60">
                            <p class="font-medium text-zinc-400">Access Point #002</p>
                            <p class="text-xs text-zinc-600">Unregistered</p>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="col-span-3">
                <div id="map" class="shadow-2xl"></div>
                
                <div class="mt-8 flex gap-8">
                    <div class="panel p-6 rounded-xl flex-1">
                        <h3 class="text-zinc-400 text-sm mb-2">Active Coordinates</h3>
                        <div class="flex items-baseline gap-4">
                            <span class="text-4xl font-mono text-cyan-400" id="coord-x">0.00</span>
                            <span class="text-zinc-600 uppercase text-xs">Lat/X</span>
                            <span class="text-4xl font-mono text-cyan-400" id="coord-y">0.00</span>
                            <span class="text-zinc-600 uppercase text-xs">Lng/Y</span>
                        </div>
                    </div>
                    <div class="panel p-6 rounded-xl flex-1 bg-gradient-to-br from-cyan-900/20 to-transparent">
                        <h3 class="text-zinc-400 text-sm mb-2">Spatial Coverage</h3>
                        <p class="text-2xl text-white">High Density <span class="text-sm text-cyan-500 font-normal">85% Overlay</span></p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1
        });

        const bounds = [[0, 0], [1000, 1000]];
        // Placeholder floor plan image
        const image = L.imageOverlay('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?auto=format&fit=crop&q=80&w=1000', bounds).addTo(map);

        map.fitBounds(bounds);

        let activeMarker = null;

        map.on('click', function(e) {
            if (activeMarker) map.removeLayer(activeMarker);
            
            const icon = L.divIcon({ className: 'ap-marker' });
            activeMarker = L.marker(e.latlng, { icon: icon }).addTo(map);
            
            document.getElementById('coord-x').innerText = e.latlng.lat.toFixed(2);
            document.getElementById('coord-y').innerText = e.latlng.lng.toFixed(2);
        });
    </script>
</body>
</html>
