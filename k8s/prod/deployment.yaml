apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-promotion-prod
  namespace: circleguard-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: circleguard-promotion
  template:
    metadata:
      labels:
        app: circleguard-promotion
    spec:
      containers:
      - name: promotion-service
        image: circleguard/promotion-service:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-promotion-prod
  namespace: circleguard-prod
spec:
  selector:
    app: circleguard-promotion
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
