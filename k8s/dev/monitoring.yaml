---
# ============================================================
# ConfigMaps
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: circleguard-dev
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alert-rules.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: circleguard-auth-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["circleguard-auth-service:8080"]
      - job_name: circleguard-identity-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["circleguard-identity-service:8080"]
      - job_name: circleguard-gateway-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["circleguard-gateway-service:8080"]
      - job_name: circleguard-form-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["circleguard-form-service:8080"]
      - job_name: circleguard-promotion-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["circleguard-promotion-service:8080"]
      - job_name: circleguard-notification-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["circleguard-notification-service:8080"]
  alert-rules.yml: |
    groups:
      - name: circleguard-alerts
        rules:
          - alert: ServiceDown
            expr: up{job=~"circleguard-.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} has been unreachable for more than 1 minute."
          - alert: HighLatency
            expr: http_server_requests_seconds_max{exception="None"} > 2
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High latency on {{ $labels.job }}"
              description: "{{ $labels.job }} has request latency > 2s for the last minute."
          - alert: HighErrorRate
            expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) * 100 > 5
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "Error rate on {{ $labels.job }} is above 5%."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: circleguard-dev
data:
    alertmanager.yml: |
      route:
        receiver: default-receiver
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        group_by: [alertname, job]
      receivers:
        - name: default-receiver
          webhook_configs:
            - url: http://localhost:9093/
              send_resolved: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: circleguard-dev
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: circleguard-dev
data:
  dashboard-provider.yml: |
    apiVersion: 1
    providers:
      - name: circleguard
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: circleguard-dev
data:
  dashboard.json: |
    {
      "title": "CircleGuard - Service Overview",
      "tags": ["circleguard", "microservices"],
      "schemaVersion": 36,
      "version": 1,
      "panels": [
        {
          "title": "Service Uptime",
          "type": "stat",
          "gridPos": {"h": 4, "w": 12, "x": 0, "y": 0},
          "targets": [{"expr": "up{job=~\"circleguard-.*\"}", "legendFormat": "{{job}}"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]}}}
        },
        {
          "title": "Request Rate (req/s) by Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "rate(http_server_requests_seconds_count[1m])", "legendFormat": "{{service}}"}]
        },
        {
          "title": "P99 Latency by Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{"expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, service))", "legendFormat": "{{service}}"}]
        },
        {
          "title": "Error Rate (%) by Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) by (service) / sum(rate(http_server_requests_seconds_count[5m])) by (service) * 100", "legendFormat": "{{service}}"}]
        },
        {
          "title": "JVM Memory Usage by Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{"expr": "jvm_memory_used_bytes{area=\"heap\"} / 1024 / 1024", "legendFormat": "{{service}}"}]
        },
        {
          "title": "Auth: Login Activity",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 20},
          "targets": [
            {"expr": "rate(circleguard_auth_login_attempts_total[5m])", "legendFormat": "Attempts"},
            {"expr": "rate(circleguard_auth_login_success_total[5m])", "legendFormat": "Success"},
            {"expr": "rate(circleguard_auth_login_failures_total[5m])", "legendFormat": "Failures"}
          ]
        },
        {
          "title": "Identity: Mappings & Lookups",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 20},
          "targets": [
            {"expr": "rate(circleguard_identity_map_total[5m])", "legendFormat": "Mapped"},
            {"expr": "rate(circleguard_identity_lookup_total_total[5m])", "legendFormat": "Lookups"}
          ]
        },
        {
          "title": "Form: Surveys Submitted",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 20},
          "targets": [
            {"expr": "rate(circleguard_form_survey_submitted_total[5m])", "legendFormat": "Submitted"},
            {"expr": "rate(circleguard_form_survey_validated_total[5m])", "legendFormat": "Validated"}
          ]
        },
        {
          "title": "Promotion: Health Status Changes",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 26},
          "targets": [
            {"expr": "rate(circleguard_promotion_health_report_total[5m])", "legendFormat": "Reports"},
            {"expr": "rate(circleguard_promotion_encounter_reported_total[5m])", "legendFormat": "Encounters"}
          ]
        },
        {
          "title": "Promotion: Circles Activity",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 26},
          "targets": [
            {"expr": "rate(circleguard_promotion_circle_created_total[5m])", "legendFormat": "Created"},
            {"expr": "rate(circleguard_promotion_circle_joined_total[5m])", "legendFormat": "Joined"},
            {"expr": "rate(circleguard_promotion_circle_fenced_total[5m])", "legendFormat": "Fenced"}
          ]
        },
        {
          "title": "Gateway: Campus Access",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 26},
          "targets": [
            {"expr": "rate(circleguard_gateway_access_granted_total[5m])", "legendFormat": "Granted"},
            {"expr": "rate(circleguard_gateway_access_denied_total[5m])", "legendFormat": "Denied"}
          ]
        },
        {
          "title": "Notification: Channels",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 32},
          "targets": [
            {"expr": "rate(circleguard_notification_email_sent_total[5m])", "legendFormat": "Email"},
            {"expr": "rate(circleguard_notification_sms_sent_total[5m])", "legendFormat": "SMS"},
            {"expr": "rate(circleguard_notification_push_sent_total[5m])", "legendFormat": "Push"}
          ]
        },
        {
          "title": "File: Uploads",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 32},
          "targets": [
            {"expr": "rate(circleguard_file_uploaded_total[5m])", "legendFormat": "Uploads"},
            {"expr": "rate(circleguard_file_upload_errors_total[5m])", "legendFormat": "Errors"}
          ]
        }
      ]
    }

---
# ============================================================
# Deployments
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: circleguard-dev
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: circleguard-dev
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
          ports:
            - containerPort: 9093
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: circleguard-dev
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_INSTALL_PLUGINS
              value: ""
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: circleguard-dev
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 16686  # UI
            - containerPort: 4318   # OTLP HTTP
            - containerPort: 4317   # OTLP gRPC
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
# ============================================================
# Services
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: circleguard-dev
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: circleguard-dev
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: circleguard-dev
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: circleguard-dev
spec:
  selector:
    app: jaeger
  ports:
    - port: 16686
      targetPort: 16686
      name: ui
    - port: 4318
      targetPort: 4318
      name: otlp-http
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
